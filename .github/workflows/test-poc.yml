name: Validate Test PoC

on:
  push:
    branches:
      - test-poc
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-poc-validation
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PLAYWRIGHT_CHROMIUM_CHANNEL: chrome

jobs:
  validate_app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup Node
        uses: actions/setup-node@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Verify hosted Chrome
        run: google-chrome --version

      - name: App integrity gate
        run: npm run qa:app
