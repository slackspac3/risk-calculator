name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-site
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate_app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup Node
        uses: actions/setup-node@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        timeout-minutes: 10
        run: npx playwright install chromium

      - name: App integrity gate
        run: npm run qa:app

  publish:
    runs-on: ubuntu-latest
    needs: validate_app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp README.md _site/README.md
          find . -maxdepth 1 -type f -name 'google*.html' -exec cp {} _site/ \;
          cp -R assets _site/assets
          cp -R data _site/data
          touch _site/.nojekyll

      - name: Publish production site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          clean-exclude: |
            test/
          force: false
          commit-message: Publish GitHub Pages from master
