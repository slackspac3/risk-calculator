name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-site
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PLAYWRIGHT_CHROMIUM_CHANNEL: chrome

jobs:
  validate_app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup Node
        uses: actions/setup-node@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Verify hosted Chrome
        run: google-chrome --version

      - name: App integrity gate
        run: npm run qa:app

  publish:
    runs-on: ubuntu-latest
    needs: validate_app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp README.md _site/README.md
          find . -maxdepth 1 -type f -name 'google*.html' -exec cp {} _site/ \;
          cp -R assets _site/assets
          cp -R data _site/data
          mkdir -p _site/test
          cat > _site/test/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="robots" content="noindex,nofollow">
            <title>Risk Calculator Preview Retired</title>
          </head>
          <body>
            <main style="font-family:system-ui,-apple-system,Segoe UI,sans-serif;max-width:720px;margin:12vh auto;padding:24px;line-height:1.55">
              <h1>Preview retired</h1>
              <p>The public test preview has been retired. Use the live pilot root or a fresh protected preview build for validation.</p>
            </main>
          </body>
          </html>
          HTML
          touch _site/.nojekyll

      - name: Publish production site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          force: false
          commit-message: Publish GitHub Pages from master
